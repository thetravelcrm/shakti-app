name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log || true
          echo "=== ERRORS ONLY ==="
          grep -n "error:" build.log || true
          echo "=== END ERRORS ==="
          grep -c "error:" build.log && exit 1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shakti-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
