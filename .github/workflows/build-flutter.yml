name: Build Shakti Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'shakti_flutter/**'
      - '.github/workflows/build-flutter.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create full Flutter project
        run: |
          # Use flutter create to generate a proper project with all android scaffolding
          flutter create --org com.shakti --project-name shakti_app /tmp/shakti_base

          # Overlay our source code on top
          cp -r shakti_flutter/lib /tmp/shakti_base/
          cp shakti_flutter/pubspec.yaml /tmp/shakti_base/pubspec.yaml
          cp shakti_flutter/analysis_options.yaml /tmp/shakti_base/ 2>/dev/null || true

          # Copy assets
          mkdir -p /tmp/shakti_base/assets/images
          cp -r shakti_flutter/assets/ /tmp/shakti_base/ 2>/dev/null || true

      - name: Configure Android permissions and settings
        working-directory: /tmp/shakti_base
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add required permissions before <application
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <application|' "$MANIFEST"

          # Set app label
          sed -i 's/android:label="[^"]*"/android:label="Shakti"/' "$MANIFEST"

          # Set minSdk to 21 in build.gradle
          BUILD_GRADLE="android/app/build.gradle"
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' "$BUILD_GRADLE"
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' "$BUILD_GRADLE"
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/' "$BUILD_GRADLE"

          echo "=== app/build.gradle ==="
          cat "$BUILD_GRADLE"

      - name: Get dependencies
        working-directory: /tmp/shakti_base
        run: flutter pub get

      - name: Show app build.gradle
        working-directory: /tmp/shakti_base
        run: cat android/app/build.gradle

      - name: Build Debug APK
        working-directory: /tmp/shakti_base
        run: |
          flutter build apk --debug --no-shrink --verbose 2>&1 | tee /tmp/build_log.txt; BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== ERRORS AND WARNINGS ==="
          grep -E "error:|warning:|Error:|e:.*\.kt|\.java.*error" /tmp/build_log.txt || true
          echo "=== LAST 50 LINES ==="
          tail -50 /tmp/build_log.txt
          exit $BUILD_EXIT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shakti-flutter-debug-apk
          path: /tmp/shakti_base/build/app/outputs/flutter-apk/app-debug.apk
